<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · CareForAll Admin Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-dot"></div>
      <span>CAREFORALL</span>
    </div>
    <div class="login-subtitle">Admin Portal</div>

    <form id="login-form">
      <div class="login-field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="username">
      </div>
      <div class="login-field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" id="login-submit-btn">Sign In</button>
      <div id="login-error" class="login-error"></div>
    </form>
  </div>
</div>

<script type="module" src="/src/login.js"></script>
</body>
</html>
